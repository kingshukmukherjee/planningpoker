services:
  # ── Backend Web Service ──────────────────────────────────────────────────────
  - type: web
    name: planning-poker-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false   # Set this manually in the Render dashboard after deploying the client

  # ── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: planning-poker-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        sync: false   # Set this manually in the Render dashboard to the server's URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
